name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # يسمح بتشغيل المزامنة يدوياً من GitHub
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # إضافة Hugging Face كمستودع بعيد (Remote)
          # استبدل username و space-name ببياناتك الحقيقية
          git push --force https://YOUR_HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/YOUR_HF_USERNAME/YOUR_SPACE_NAME main
          
